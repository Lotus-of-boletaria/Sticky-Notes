<!-- posts/templates/posts/post_detail.html --> 
{% extends 'base.html' %} 
{% block title %} 
  Sticky Notes - {{ post.title }} 
{% endblock %} 
{% block content %} 
  <h2> 
    {{ post.title }} 
  </h2> 
  <p> 
    {{ post.content }} 
  </p> 
  <p> 
    Created at: {{ post.created_at }} 
  </p> 
  <a href="{% url 'post_update' pk=post.pk %}">Update Note</a> 
  <a href="{% url 'post_delete' pk=post.pk %}">Delete Note</a> 
  <a href="{% url 'post_list' %}">Back to Note List</a>
{% endblock %}
